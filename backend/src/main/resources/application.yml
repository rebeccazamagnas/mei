server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/mei_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  jackson:
    time-zone: America/Sao_Paulo

cors:
  allowed-origins: http://localhost:4200,http://frontend:80
